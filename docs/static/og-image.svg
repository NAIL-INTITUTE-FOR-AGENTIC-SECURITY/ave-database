<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#6366f1" stroke-width="1"/>
  </g>

  <!-- Decorative glow circle -->
  <circle cx="900" cy="200" r="250" fill="url(#glow)" />
  <circle cx="200" cy="500" r="180" fill="url(#glow)" />

  <!-- Shield icon -->
  <g transform="translate(80, 140)">
    <path d="M50 0 L100 25 L100 65 C100 95 75 120 50 130 C25 120 0 95 0 65 L0 25 Z"
          fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.9"/>
    <path d="M50 20 L35 55 L50 48 L65 55 Z"
          fill="url(#accent)" opacity="0.7"/>
    <text x="50" y="90" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="16" font-weight="bold">AVE</text>
  </g>

  <!-- Top accent line -->
  <rect x="80" y="100" width="120" height="3" rx="2" fill="url(#accent)" />

  <!-- Main title -->
  <text x="80" y="230" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" letter-spacing="-1">
    NAIL Institute
  </text>

  <!-- Subtitle -->
  <text x="80" y="290" fill="#a5b4fc" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400">
    Agentic Vulnerabilities &amp; Exposures
  </text>

  <!-- Description -->
  <text x="80" y="360" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="300">
    The first systematic database of AI agent failure modes.
  </text>
  <text x="80" y="392" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="300">
    Browse, search, and contribute vulnerability cards.
  </text>

  <!-- Stats boxes -->
  <g transform="translate(80, 440)">
    <!-- Box 1 -->
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="90" y="35" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="28" font-weight="bold">36+</text>
    <text x="90" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">AVE Cards</text>

    <!-- Box 2 -->
    <rect x="200" y="0" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="290" y="35" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="28" font-weight="bold">14</text>
    <text x="290" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Categories</text>

    <!-- Box 3 -->
    <rect x="400" y="0" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="490" y="35" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="28" font-weight="bold">5</text>
    <text x="490" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Severity Tiers</text>

    <!-- Box 4 -->
    <rect x="600" y="0" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="690" y="35" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="28" font-weight="bold">API</text>
    <text x="690" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">Public &amp; Free</text>
  </g>

  <!-- URL -->
  <text x="80" y="580" fill="#6366f1" font-family="monospace" font-size="20" font-weight="600">nailinstitute.org</text>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" />

  <!-- Decorative code snippets (right side) -->
  <g transform="translate(800, 140)" opacity="0.25">
    <text x="0" y="0" fill="#6366f1" font-family="monospace" font-size="14">GET /ave/AVE-2025-0001</text>
    <text x="0" y="24" fill="#4ade80" font-family="monospace" font-size="14">200 OK</text>
    <text x="0" y="48" fill="#94a3b8" font-family="monospace" font-size="14">{</text>
    <text x="0" y="72" fill="#94a3b8" font-family="monospace" font-size="14">  "severity": "critical",</text>
    <text x="0" y="96" fill="#94a3b8" font-family="monospace" font-size="14">  "category": "injection",</text>
    <text x="0" y="120" fill="#94a3b8" font-family="monospace" font-size="14">  "status": "validated"</text>
    <text x="0" y="144" fill="#94a3b8" font-family="monospace" font-size="14">}</text>
  </g>
</svg>
