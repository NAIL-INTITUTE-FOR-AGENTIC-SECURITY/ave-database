name: AVE Card Validation

on:
  pull_request:
    paths:
      - 'ave-database/cards/**'
      - 'ave/ave/schema.py'
  push:
    paths:
      - 'ave-database/cards/**'
    branches: [main]

jobs:
  validate-cards:
    name: Validate AVE Cards
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install NAIL AVE package
        run: |
          pip install -e ave/

      - name: Validate all AVE cards
        run: |
          python -m ave validate ave-database/cards/

      - name: Check index is up to date
        run: |
          python3 -c "
          import json, glob, os
          cards_dir = 'ave-database/cards'
          idx = {'total': 0, 'cards': {}, 'categories': set(), 'severities': set()}
          for f in sorted(glob.glob(os.path.join(cards_dir, 'AVE-*.json'))):
              with open(f) as fh:
                  card = json.load(fh)
              ave_id = card.get('ave_id', card.get('id', os.path.basename(f).replace('.json','')))
              idx['cards'][ave_id] = {
                  'name': card.get('name', card.get('title', '')),
                  'category': card.get('category', ''),
                  'severity': card.get('severity', ''),
                  'status': card.get('status', '')
              }
              idx['categories'].add(card.get('category', ''))
              idx['severities'].add(card.get('severity', ''))
          idx['total'] = len(idx['cards'])
          idx['categories'] = sorted(idx['categories'])
          idx['severities'] = sorted(idx['severities'])
          with open('/tmp/index.json', 'w') as fh:
              json.dump(idx, fh, indent=2)
              fh.write('\n')
          "
          if ! diff -q ave-database/index.json /tmp/index.json > /dev/null 2>&1; then
            echo "::error::ave-database/index.json is out of date. Regenerate it from the cards."
            diff ave-database/index.json /tmp/index.json || true
            exit 1
          fi
          echo "✓ index.json is up to date"

      - name: Verify JSON/Markdown pairs
        run: |
          cd ave-database/cards
          errors=0
          for json_file in *.json; do
            md_file="${json_file%.json}.md"
            if [ ! -f "$md_file" ]; then
              echo "::error::Missing markdown companion: $md_file for $json_file"
              errors=$((errors + 1))
            fi
          done
          for md_file in *.md; do
            json_file="${md_file%.md}.json"
            if [ ! -f "$json_file" ]; then
              echo "::error::Missing JSON companion: $json_file for $md_file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors missing companion files"
            exit 1
          fi
          echo "✓ All JSON/Markdown pairs verified"

      - name: Summary
        if: always()
        run: |
          total=$(ls ave-database/cards/*.json 2>/dev/null | wc -l)
          echo "### AVE Card Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Total cards:** $total" >> $GITHUB_STEP_SUMMARY
          echo "- **Validation:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  run-tests:
    name: Run AVE Toolkit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AVE package
        run: |
          pip install -e ave/
          pip install pytest

      - name: Run AVE toolkit tests
        run: |
          python -c "
          import ave
          print(f'AVE v{ave.__version__} loaded')
          cards = ave.all_cards()
          print(f'Loaded {len(cards)} cards from database')
          assert len(cards) > 0, 'No cards loaded'
          print('✓ All basic checks passed')
          "

      - name: Validate cards programmatically
        run: |
          python -c "
          from ave.validate import validate_card_file
          from pathlib import Path
          cards_dir = Path('ave-database/cards')
          errors = 0
          for f in sorted(cards_dir.glob('AVE-*.json')):
              issues = validate_card_file(str(f))
              if issues:
                  print(f'✗ {f.stem}: {issues}')
                  errors += 1
              else:
                  print(f'✓ {f.stem}')
          if errors:
              raise SystemExit(f'{errors} cards failed validation')
          print(f'✓ All cards validated successfully')
          "
