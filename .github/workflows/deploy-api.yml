name: Deploy Public API

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'ave-database/**'
      - 'Dockerfile'
      - 'fly.toml'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install fastapi uvicorn httpx pytest

      - name: Validate API imports
        run: |
          cd api
          python -c "from server import create_app; print('✅ API imports OK')"

      - name: Run hardening tests
        run: python -m pytest api/tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
